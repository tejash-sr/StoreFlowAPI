spring:
  application:
    name: storeflow-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/storeflow}
    username: ${DB_USERNAME:storeflow_user}
    password: ${DB_PASSWORD:storeflow_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:changeme@example.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

jwt:
  secret: ${JWT_SECRET:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:900}
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800}

storage:
  base-path: ${STORAGE_PATH:./uploads}
  max-file-size-bytes: ${MAX_FILE_SIZE:5242880}
  allowed-image-types:
    - image/jpeg
    - image/png
    - image/webp

rate-limit:
  auth:
    capacity: ${RATE_LIMIT_CAPACITY:5}
    refill-minutes: ${RATE_LIMIT_REFILL:15}

inventory:
  low-stock-threshold: ${LOW_STOCK_THRESHOLD:10}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/pdf,text/csv

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  level:
    root: INFO
    com.grootan.storeflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{ISO8601} [%X{traceId:-NO_TRACE}] [%X{userId:-ANONYMOUS}] %-5level %logger{36} - %msg%n"
