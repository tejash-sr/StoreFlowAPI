# =====================================================================
# StoreFlow API — Example Configuration
# Copy this to application-local.yml and fill in real values.
# NEVER commit application-local.yml — it is in .gitignore
# =====================================================================

spring:
  application:
    name: storeflow-api

  # --- Database ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/storeflow}
    username: ${DB_USERNAME:storeflow_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate         # Never use create/drop in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false          # Disable OSIV for performance

  # --- Flyway ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # --- Email ---
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:changeme@example.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  # --- JPA Auditing ---
  data:
    jpa:
      repositories:
        enabled: true
  jpa_auditing:
    enabled: true

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful           # Drain in-flight requests before shutdown
  compression:
    enabled: true
    min-response-size: 1024   # Compress responses > 1KB
    mime-types: application/json,application/pdf,text/csv

# --- JWT ---
jwt:
  secret: ${JWT_SECRET:changeme-this-must-be-at-least-256-bits-for-hs256}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:900}        # seconds (15 min)
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800}   # seconds (7 days)

# --- File Storage ---
storage:
  base-path: ${STORAGE_PATH:./uploads}
  max-file-size-bytes: ${MAX_FILE_SIZE:5242880}         # 5 MB
  allowed-image-types:
    - image/jpeg
    - image/png
    - image/webp

# --- Rate Limiting (Bucket4j) ---
rate-limit:
  auth:
    capacity: ${RATE_LIMIT_CAPACITY:5}
    refill-minutes: ${RATE_LIMIT_REFILL:15}

# --- Inventory ---
inventory:
  low-stock-threshold: ${LOW_STOCK_THRESHOLD:10}

# --- Spring Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# --- Logging ---
logging:
  level:
    root: INFO
    com.grootan.storeflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{ISO8601} [%X{traceId:-NO_TRACE}] [%X{userId:-ANONYMOUS}] %-5level %logger{36} - %msg%n"
